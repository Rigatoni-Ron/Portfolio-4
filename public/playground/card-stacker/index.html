<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lender Stacker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas: #d6d9dd;
        --space-12: 48px;
        --sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text",
          system-ui, sans-serif;

        /* card tokens (from Figma 1:7) */
        --card-bg: #1a1a1a;
        --card-radius: 16px;
        --card-pad: 12px;
        --card-gap: 12px;
        --card-img: 78px;
        --card-img-bg: rgba(186, 186, 186, 0.2);
        --card-img-radius: 8px;
        --card-title: #d2d2d2;
        --card-subtitle: #777;
      }

      * { box-sizing: border-box; }

      html, body, #root { height: 100%; }

      body {
        margin: 0;
        font-family: var(--sans);
        background: var(--canvas);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* ── Stage (Crypto glass widget BG) ───────────────────── */
      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: var(--space-12);
        position: relative;
        overflow: hidden;
        perspective: 1400px;
        perspective-origin: 50% 35%;
        background: radial-gradient(
            1200px 800px at 70% 20%,
            #e6e9ed 0%,
            transparent 60%
          ),
          radial-gradient(900px 700px at 20% 90%, #c9ccd1 0%, transparent 55%),
          var(--canvas);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
            rgba(12, 15, 20, 0.045) 1px,
            transparent 1px
          );
        background-size: 24px 24px;
        mask-image: radial-gradient(
          ellipse at center,
          black 40%,
          transparent 80%
        );
        pointer-events: none;
      }

      /* ── Stack: vertical lineup of cards ────────────────────── */
      .stack {
        position: relative;
        width: 400px;
        height: 220px;
        transform-style: preserve-3d;
      }

      /* ── Card (matches Figma 1:7) ─────────────────────────── */
      /* Children are absolutely positioned so we can fluidly morph
         from a row layout (image left, text right) to a column layout
         (image on top, text below) when the card is selected. */
      .card {
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -51px;   /* half of 102 (collapsed card height) */
        margin-left: -200px; /* half of 400 (card width) */
        width: 400px;
        height: 102px;
        /* Floor the bouncy shrink at the resting height so there's always
           room for the image inside its 12px padding — otherwise the card
           overshoots smaller than the image and the image pokes out. */
        min-height: 102px;
        background: var(--card-bg);
        border-radius: var(--card-radius);
        /* Clip any momentary overshoot of the inner image to the card's
           rounded bounds so the image can bounce in sync without poking out. */
        overflow: hidden;
        transform: translate3d(0, var(--ty), 0);
        transform-origin: 50% 100%;
        /* Transform and height share the same duration + easing so the
           card grows as one unified gesture instead of two staggered ones. */
        transition: transform 0.5s cubic-bezier(0.34, 1.25, 0.64, 1),
                    height 0.5s cubic-bezier(0.34, 1.25, 0.64, 1),
                    box-shadow 0.18s ease-out,
                    background 0.18s ease-out,
                    opacity 0.3s ease-out;
        will-change: transform;
        cursor: pointer;
        z-index: var(--z);
        box-shadow:
          0 24px 60px -20px rgba(8, 10, 14, 0.55),
          0 8px 24px -10px rgba(8, 10, 14, 0.35);
      }

      /* Selected: non-pressed cards slide left and tuck against the left
         edge of the viewport at full opacity (no fade). The calc anchors
         their center 250px from the viewport's left edge — card extends
         from 50px to 450px in, leaving a tidy margin. The Y uses
         var(--ty-left) so cards below the selected one shift up a slot
         to fill the gap, then animate back down on reset. */
      .stack.selected .card {
        transform: translate3d(calc(-50vw + 250px), var(--ty-left), 0) rotate(0deg);
        /* Tucked cards remain clickable so the user can swap selection
           directly. Durations match the selected card's so the outgoing
           and incoming card animate on the same clock during a swap. */
        transition-duration: 0.5s, 0.5s, 0.18s, 0.18s, 0s;
      }

      /* Selected card: slide up and morph taller in one motion. No
         delays anywhere on the selected card so transform, height,
         image scale and text all kick off in the same frame. */
      .stack.selected .card.is-selected {
        transform: translate3d(0, var(--top-ty), 0) rotate(0deg);
        /* Per-card height measured from real content (see Card component)
           so the card ends 12px below its last element — matching the
           12px gap above the image. Falls back to 720px pre-measure. */
        height: var(--expanded-h, 720px);
        opacity: 1;
        pointer-events: auto;
        transition-delay: 0s, 0s, 0s, 0s, 0s;
        transition-duration: 0.5s, 0.5s, 0.18s, 0.18s, 0s;
        box-shadow:
          0 24px 60px -20px rgba(8, 10, 14, 0.55),
          0 8px 24px -10px rgba(8, 10, 14, 0.35);
      }

      /* Hover: card surface brightens — but not while the cursor is
         over the linkout button, so its own hover state reads as the
         only interactive element under the pointer. */
      .card:hover:not(:has(.card-linkout:hover)):not(:has(.card-cta:hover)) {
        background: #262626;
      }

      /* Brand tile: CSS-rendered hero block that replaces the EVA
         version's image/video. Same geometry and scale choreography
         so the open animation feels identical. The large monogram on
         an accent-toned gradient gives each lender a distinct mark
         without needing any image assets. To swap in real logos later,
         replace this div with an <img class="card-hero" src="..." />. */
      .card-hero {
        position: absolute;
        top: 12px;
        left: 12px;
        /* Default = collapsed thumbnail. width/height morph (rather
           than transform scale) so the icon inside isn't squished by
           the rectangle-to-square aspect ratio change. */
        width: 78px;
        height: 78px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        z-index: 1;
        overflow: hidden;
        /* Flat dark surface underneath the shader canvas so the brief
           moment before WebGL paints its first frame doesn't flash the
           old colorful gradient. Matches the shader's dark base
           (uAccent * 0.06 is near-black for every accent). */
        background: #0e0f12;
        color: rgba(255, 255, 255, 0.94);
        font-weight: 700;
        font-size: 168px;
        letter-spacing: -0.04em;
        line-height: 1;
        transition: width 0.5s cubic-bezier(0.34, 1.25, 0.64, 1),
                    height 0.5s cubic-bezier(0.34, 1.25, 0.64, 1);
      }
      .stack.selected .card.is-selected .card-hero {
        width: 376px;
        height: 200px;
        transition-timing-function: cubic-bezier(0.7, 0, 0.3, 1);
      }

      /* Shader canvas: WebGL line-field renders for every card. The
         canvas always mounts so the collapsed state shows a static
         frame matching the animated version. Saturation is keyed to
         the selected state — collapsed cards show a grayscale frame,
         and color blooms in as the card expands. */
      .card-shader {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        /* Per-card --grey-brightness equalises the greyscale luminance
           across cards so warm and cool accents read at the same grey
           when collapsed. Falls back to 1 if the var isn't set. */
        filter: saturate(0) brightness(var(--grey-brightness, 1));
        transition: filter 0.5s ease-in;
      }
      /* Active = selected OR hovered (set from JS). Both states bring
         the shader into full color and start the rAF animation. */
      .card-shader.is-active {
        filter: saturate(1) brightness(1);
        transition-timing-function: ease-out;
      }
      /* Ticker text sits above the canvas via z-index. */
      .card-hero-ticker {
        position: relative;
        z-index: 1;
      }
      /* Icon variant of the hero brand mark — sized to occupy a
         comfortable ~60% of the tile so it reads as the primary
         identity in both collapsed and expanded states. */
      .card-hero-icon {
        position: relative;
        z-index: 1;
        /* Default = collapsed icon size. Transitions to 120px when
           the card expands, in lockstep with the hero's growth. */
        width: 42px;
        height: 42px;
        display: block;
        transition: width 0.5s cubic-bezier(0.34, 1.25, 0.64, 1),
                    height 0.5s cubic-bezier(0.34, 1.25, 0.64, 1);
      }
      .stack.selected .card.is-selected .card-hero-icon {
        width: 120px;
        height: 120px;
        transition-timing-function: cubic-bezier(0.7, 0, 0.3, 1);
      }

      /* Text path is split across two nested elements so the Y axis
         and X axis can be choreographed independently. The visual
         result is a curved path "around" the image instead of a
         straight diagonal that would cut underneath it. */
      .card-text {
        position: absolute;
        top: 224px;
        left: 12px;
        width: 376px;
        /* Outer wrapper owns vertical motion. Flex row so the linkout
           button sits to the right of the title/subtitle column and
           rides the same Y track in both collapsed and expanded states. */
        display: flex;
        align-items: center;
        justify-content: space-between;
        /* Collapsed text y = 25 (vertically centered in the 102px
           row); 224 - 25 = 199 — lifts the text into the collapsed
           row position when not selected. */
        transform: translate3d(0, -199px, 0);
        will-change: transform;
        transition: transform 0.48s cubic-bezier(0.34, 1.1, 0.64, 1);
      }

      .card-text-inner {
        display: flex;
        flex-direction: column;
        gap: 4px;
        /* Inner owns horizontal motion. */
        transform: translate3d(90px, 0, 0);
        will-change: transform;
        transition: transform 0.38s cubic-bezier(0.34, 1.1, 0.64, 1);
      }

      /* Text Y drops immediately so it clears the image's growing
         footprint as one continuous motion with the card expanding. */
      .stack.selected .card.is-selected .card-text {
        transform: translate3d(0, 0, 0);
        transition-delay: 0s;
      }

      /* Text X slides left a hair after Y has begun, so the text path
         curves around the image's right edge instead of diagonally
         cutting through it. The delay is short enough that, paired
         with overlapping easings, it still reads as one fluid gesture. */
      .stack.selected .card.is-selected .card-text-inner {
        transform: translate3d(0, 0, 0);
        transition-delay: 0.12s;
      }

      .card-title {
        margin: 0;
        font-family: var(--sans);
        font-weight: 500;
        font-size: 18px;
        line-height: 27px;
        color: var(--card-title);
      }

      .card-subtitle {
        margin: 0;
        font-family: var(--sans);
        font-weight: 400;
        font-size: 14px;
        line-height: 21px;
        color: var(--card-subtitle);
      }

      /* Material Symbols icon font reset. Without these declarations
         the browser briefly renders the ligature name ("arrow_outward")
         as text before the font swap completes. */
      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        font-size: 16px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
      }

      /* Linkout button: 16px icon with 8px padding all around (so
         a 32×32 target), 8px radius, 1px light border, transparent
         fill until hover. Sits to the right of the title text in both
         collapsed and expanded states by virtue of living inside
         .card-text (which already owns the Y choreography). */
      .card-linkout {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: transparent;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        transition: background 0.18s ease, border-color 0.18s ease,
                    color 0.18s ease;
      }
      .card-linkout:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.32);
        color: rgba(255, 255, 255, 0.95);
      }

      /* ── Expanded-only content ──────────────────────────────
         Sits below the title at a fixed position inside the card.
         The card's overflow:hidden naturally clips this until the
         card has grown tall enough to reveal it. Each child fades
         and lifts in with a staggered delay so the section reads
         as one cascade rather than a single block pop. */
      .card-extra {
        position: absolute;
        top: 300px;
        left: 12px;
        right: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
      }

      /* Default (collapsed / non-selected): children are hidden.
         The very short opacity transition handles the close path —
         a snap would leave one jarring frame where the card is
         still tall enough to show the content at full opacity. */
      .card-extra > * {
        opacity: 0;
        transform: translateY(-10px);
        transition: opacity 0.1s ease-out, transform 0s;
      }

      /* Selected: each child fades and lifts into place. Delays
         start ~0.2s in so the content arrives as the card's
         growing height first reveals this region. */
      .stack.selected .card.is-selected .card-extra {
        pointer-events: auto;
      }
      .stack.selected .card.is-selected .card-extra > * {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.44s ease-out,
                    transform 0.56s cubic-bezier(0.34, 1.0, 0.64, 1);
      }
      .stack.selected .card.is-selected .card-extra > *:nth-child(1) { transition-delay: 0.22s; }
      .stack.selected .card.is-selected .card-extra > *:nth-child(2) { transition-delay: 0.30s; }
      .stack.selected .card.is-selected .card-extra > *:nth-child(3) { transition-delay: 0.38s; }
      .stack.selected .card.is-selected .card-extra > *:nth-child(4) { transition-delay: 0.45s; }

      /* Accepted-collateral line: a body-copy paragraph with a
         slightly muted prefix. Reads as a labeled sales-deck data
         point rather than a visual chip row. */
      .card-collateral {
        margin: 0;
        font-size: 13px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.62);
      }
      .card-collateral .prefix {
        color: rgba(255, 255, 255, 0.42);
      }

      /* Stats: three-column data panel. 1px gap + dark child bg
         on lighter parent gives the inset divider look without
         actual borders between cells. */
      .card-stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        overflow: hidden;
      }
      .card-stat {
        background: rgba(0, 0, 0, 0.28);
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .card-stat .label {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
      }
      .card-stat .value {
        font-size: 18px;
        font-weight: 600;
        color: var(--card-title);
        font-variant-numeric: tabular-nums;
      }
      .card-stat .unit {
        font-size: 11px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.4);
        margin-left: 2px;
      }

      /* Primary CTA at the bottom of the expanded content. Sits as
         the last child of .card-extra so it picks up the staggered
         fade-in delay and only animates in while the card is open. */
      .card-cta {
        display: block;
        width: 100%;
        padding: 12px 16px;
        margin: 0;
        border: none;
        border-radius: 8px;
        background: #e2e2e2;
        color: #1a1a1a;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 500;
        /* Explicit line-height pinned to the rolodex's so the button
           height doesn't change between idle text and the rolodex. */
        line-height: 1.4;
        text-align: center;
        cursor: pointer;
        position: relative;
        /* Clips the plane while it's still off-screen during the
           sending state. */
        overflow: hidden;
        /* Long bg/color transition lives on the base so it's already
           in effect when .is-sent triggers the value swap — the new
           computed style alone wasn't reliable to drive a 2s fade. */
        transition: background 2s ease,
                    color 2s ease,
                    scale 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .card-cta:hover:not(:disabled) {
        background: #ffffff;
        /* Hover wants a snappy fill change, so override the slow base
           timing back to ~0.22s while still allowing :is-sent to ease. */
        transition: background 0.22s ease, scale 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      }
      /* Press feedback — scales down while held and pops back on
         release. Uses the standalone `scale` property so it composes
         with the translateY the cascade puts on .card-extra children
         (transform there would override this rule). */
      .card-cta:active:not(:disabled) {
        scale: 0.97;
      }
      /* Post-add disabled state — muted fill with light text reads as
         "this action is complete" against the dark card surface. The
         slower transition fires when .is-sending is removed, so the
         surface eases into the muted look rather than snapping. */
      /* Disabled keeps the active light fill — the rolodex landing
         on "Request sent" is the completion cue. */
      .card-cta:disabled {
        cursor: default;
      }
      /* Sent: muted dark fill with light text. The 2s ease transition
         is supplied by the base .card-cta rule above, so swapping in
         this class triggers the slow drift to the completed look. */
      .card-cta.is-sent {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.5);
      }
      /* Three-dot bouncy loader. Each dot rises and falls on its own
         delay, creating a wave of motion across the trio. */
      .card-cta-spinner {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        vertical-align: -1px;
        margin-right: 8px;
      }
      .card-cta-spinner span {
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
        animation: card-cta-bounce 0.7s ease-in-out infinite;
      }
      .card-cta-spinner span:nth-child(2) { animation-delay: 0.14s; }
      .card-cta-spinner span:nth-child(3) { animation-delay: 0.28s; }
      @keyframes card-cta-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
        40% { transform: translateY(-4px); opacity: 1; }
      }

      /* Paper plane soaring across the button on the loading→sending
         transition. Fades in shortly after entering the left edge and
         fades out before exiting the right. */
      .card-cta-plane {
        position: absolute;
        top: 50%;
        left: 0;
        font-size: 20px;
        line-height: 1;
        color: inherit;
        transform: translateY(-50%);
        opacity: 0;
        animation: card-cta-plane-fly 1s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        pointer-events: none;
      }
      @keyframes card-cta-plane-fly {
        0% { left: calc(50% - 60px); opacity: 0; }
        25% { opacity: 1; }
        75% { opacity: 1; }
        100% { left: calc(50% + 60px); opacity: 0; }
      }

      /* Rolodex container — the visible "slot" through which the
         Request sent line rolls upward into place. */
      .card-cta-rolodex {
        display: inline-block;
        overflow: hidden;
        height: 1.4em;
        line-height: 1.4em;
        vertical-align: top;
      }
      /* Each child span is a single letter — inline-block so it can be
         transformed individually. Animation-delay is set inline per
         letter so they cascade up one after another. */
      .card-cta-rolodex > span {
        display: inline-block;
        transform: translateY(100%);
        animation: card-cta-roll-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes card-cta-roll-up {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

    </style>
  </head>
  <body>
    <div id="root"></div>

            { label: "Min Loan", value: "$25", unit: "K" },
            { label: "Max LTV", value: "86", unit: "%" },
            { label: "Time to Fund", value: "Instant", unit: "" },
          ],
        },
        {
          title: "Aave",
          subtitle: "Multi-Chain Money Market",
          url: "https://aave.com",
          ticker: "AV",
          icon: "icons/aave.svg",
          shaderVariant: 5,
          accent: "rgb(177, 100, 213)",
          collateral: "blue chip, wrapped assets, LSTs, stables, alt coins, LRTs, RWAs",
          stats: [
            { label: "Min Loan", value: "$5", unit: "K" },
            { label: "Max LTV", value: "82.5", unit: "%" },
            { label: "Time to Fund", value: "Instant", unit: "" },
          ],
        },
      ];

      const N = CARDS.length;
      const CARD_H = 102;        // 78px image + 12px*2 padding
      const STACK_GAP = 12;      // vertical gap between cards in the lineup
      const ROW_PITCH = CARD_H + STACK_GAP;

      // Y-position of the top card; the selected card snaps here.
      const TOP_TY = (0 - (N - 1) / 2) * ROW_PITCH;

      // ─── Shader ──────────────────────────────────────────────
      // Single fullscreen quad + one fragment shader containing six
      // distinct line-field effects keyed off the uVariant uniform.
      // Each lender's accent color drives the gradient and the shader
      // produces stripe-like warped lines on top.
      const SHADER_VS = `attribute vec2 a; void main(){gl_Position=vec4(a,0.0,1.0);}`;

      const SHADER_FS = `
        precision mediump float;
        uniform float uTime;
        uniform vec2 uRes;
        uniform vec3 uAccent;
        uniform int uVariant;

        // 0 — Maple: horizontal stripe-like ribbons warped by stacked sines.
        vec3 m0(vec2 uv) {
          float t = uTime * 0.18;
          float warp = sin(uv.x * 3.0 + t) * 0.18
                     + sin(uv.x * 7.0 - t * 0.8) * 0.08
                     + sin(uv.x * 13.0 + uv.y * 2.0 + t * 0.4) * 0.04;
          float y = (uv.y + warp) * 70.0;
          float d = abs(fract(y) - 0.5) * 2.0;
          float intensity = pow(1.0 - smoothstep(0.0, 0.5, d), 2.0);
          intensity *= 1.0 - uv.y * 0.55;
          vec3 grad = uAccent;
          return mix(uAccent * 0.06, grad, intensity);
        }

        // 1 — Spark: concentric radial lines warped by a low-freq sine.
        vec3 m1(vec2 uv) {
          vec2 p = uv - 0.5;
          float r = length(p);
          float a = atan(p.y, p.x);
          float t = uTime * 0.4;
          float warp = sin(a * 4.0 + t) * 0.04;
          float radial = (r + warp) * 70.0;
          float d = abs(fract(radial) - 0.5) * 2.0;
          float intensity = pow(1.0 - smoothstep(0.0, 0.5, d), 2.0);
          intensity *= 1.0 - uv.y * 0.55;
          vec3 grad = mix(uAccent * 1.15, uAccent * vec3(1.0, 1.1, 0.8), r * 1.8);
          return mix(uAccent * 0.06, grad, clamp(intensity, 0.0, 1.0));
        }

        // 2 — Coinbase: subtle sweeping horizontal bands, calm and institutional.
        vec3 m2(vec2 uv) {
          float t = uTime * 0.1;
          float warp = sin(uv.x * 1.6 + t) * 0.13
                     + sin(uv.x * 3.5 - t * 0.6) * 0.06;
          float y = (uv.y + warp) * 70.0;
          float d = abs(fract(y) - 0.5) * 2.0;
          float intensity = pow(1.0 - smoothstep(0.0, 0.5, d), 2.0);
          intensity *= 1.0 - uv.y * 0.55;
          vec3 grad = mix(uAccent * 0.9, uAccent * 1.15, uv.x);
          return mix(uAccent * 0.06, grad, intensity);
        }

        // 3 — Kamino: vertical aurora-style streaks drifting horizontally.
        vec3 m3(vec2 uv) {
          float t = uTime * 0.13;
          float warp = sin(uv.y * 2.0 + t) * 0.15
                     + sin(uv.y * 5.0 - t * 0.7) * 0.07;
          float x = (uv.x + warp) * 70.0;
          float d = abs(fract(x) - 0.5) * 2.0;
          float intensity = pow(1.0 - smoothstep(0.0, 0.5, d), 2.0);
          intensity *= 1.0 - uv.y * 0.55;
          vec3 grad = mix(uAccent * 1.2, uAccent * 0.8, uv.y);
          return mix(uAccent * 0.05, grad, intensity);
        }

        // 4 — Morpho: crossed horizontal + vertical line bands (modular grid).
        vec3 m4(vec2 uv) {
          float t = uTime * 0.22;
          float warpA = sin(uv.x * 2.5 + t) * 0.1;
          float warpB = sin(uv.y * 2.5 - t * 0.8) * 0.1;
          float yA = (uv.y + warpA) * 70.0;
          float dA = abs(fract(yA) - 0.5) * 2.0;
          float intA = pow(1.0 - smoothstep(0.0, 0.5, dA), 2.0);
          float xB = (uv.x + warpB) * 70.0;
          float dB = abs(fract(xB) - 0.5) * 2.0;
          float intB = pow(1.0 - smoothstep(0.0, 0.5, dB), 2.0);
          float intensity = max(intA, intB) * 0.75 + min(intA, intB) * 0.35;
          intensity *= 1.0 - uv.y * 0.55;
          vec3 grad = mix(uAccent, uAccent * vec3(0.85, 1.1, 1.2), uv.x);
          return mix(uAccent * 0.05, grad, intensity);
        }

        // 5 — Aave: concentric ring lines pulsing outward with color cycle.
        vec3 m5(vec2 uv) {
          vec2 p = uv - 0.5;
          float r = length(p);
          float t = uTime * 0.25;
          float radial = r * 70.0 - t * 1.8;
          float d = abs(fract(radial) - 0.5) * 2.0;
          float intensity = pow(1.0 - smoothstep(0.0, 0.5, d), 2.0);
          intensity *= 1.0 - uv.y * 0.55;
          vec3 c1 = uAccent;
          vec3 c2 = uAccent * vec3(1.0, 0.8, 1.2);
          vec3 grad = mix(c1, c2, 0.5 + 0.5 * sin(t * 0.7));
          return mix(uAccent * 0.06, grad, intensity);
        }

        void main() {
          vec2 uv = gl_FragCoord.xy / uRes;
          vec3 c;
          if (uVariant == 0) c = m0(uv);
          else if (uVariant == 1) c = m1(uv);
          else if (uVariant == 2) c = m2(uv);
          else if (uVariant == 3) c = m3(uv);
          else if (uVariant == 4) c = m4(uv);
          else c = m5(uv);
          gl_FragColor = vec4(c, 1.0);
        }
      `;

      // Mounts only while isSelected is true. The teardown cancels the
      // rAF loop and explicitly loses the WebGL context so GPU memory
      // is released when the user collapses the card.
      function ShaderCanvas({ variant, accent, isSelected, isHovered }) {
        // Active = either selected or hovered. Drives both the color
        // bloom (saturation) and the rAF loop. Hovering a non-selected
        // card brings its shader to life in the same way selecting does.
        const isActive = isSelected || isHovered;
        const canvasRef = useRef(null);

        // Holds the live gl context + uTime uniform location so the
        // animation effect can drive frames without re-running the
        // expensive shader compile each time isSelected toggles.
        const ctxRef = useRef(null);

        // Setup: compile program, upload geometry, render one static
        // frame at t=0. preserveDrawingBuffer:true keeps that frame
        // visible after the rAF loop stops, so collapsed cards show
        // the same shader look as the start of the animation.
        // useLayoutEffect runs before the browser paints so the first
        // shader frame is on screen at the same time as the rest of
        // the card, with no gradient-to-shader flash on initial load.
        useLayoutEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;

          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = 376 * dpr;
          canvas.height = 200 * dpr;

          const gl = canvas.getContext("webgl", {
            antialias: true,
            premultipliedAlpha: false,
            preserveDrawingBuffer: true,
          });
          if (!gl) return;

          const compile = (type, src) => {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
              console.error("Shader compile error:", gl.getShaderInfoLog(s));
              return null;
            }
            return s;
          };

          const vs = compile(gl.VERTEX_SHADER, SHADER_VS);
          const fs = compile(gl.FRAGMENT_SHADER, SHADER_FS);
          if (!vs || !fs) return;

          const prog = gl.createProgram();
          gl.attachShader(prog, vs);
          gl.attachShader(prog, fs);
          gl.linkProgram(prog);
          if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
            console.error("Program link error:", gl.getProgramInfoLog(prog));
            return;
          }

          const buf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, buf);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -1, -1, 1, -1, -1, 1, 1, 1,
          ]), gl.STATIC_DRAW);

          gl.useProgram(prog);
          const aLoc = gl.getAttribLocation(prog, "a");
          gl.enableVertexAttribArray(aLoc);
          gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

          const uTime = gl.getUniformLocation(prog, "uTime");
          const uRes = gl.getUniformLocation(prog, "uRes");
          const uAcc = gl.getUniformLocation(prog, "uAccent");
          const uVar = gl.getUniformLocation(prog, "uVariant");

          const m = accent.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
          const rgb = m ? [+m[1] / 255, +m[2] / 255, +m[3] / 255] : [1, 1, 1];

          gl.uniform2f(uRes, canvas.width, canvas.height);
          gl.uniform3fv(uAcc, rgb);
          gl.uniform1i(uVar, variant);
          gl.viewport(0, 0, canvas.width, canvas.height);

          // Initial static frame so the collapsed card isn't blank.
          gl.uniform1f(uTime, 0);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

          ctxRef.current = { gl, uTime };

          return () => {
            const ext = gl.getExtension("WEBGL_lose_context");
            if (ext) ext.loseContext();
            ctxRef.current = null;
          };
        }, [variant, accent]);

        // Animation: drive a rAF loop while active (selected or hovered).
        // When it stops, the canvas retains the last drawn frame
        // (preserveDrawingBuffer above), so the card keeps its shader
        // look instead of snapping back to anything else.
        useEffect(() => {
          if (!isActive) return;
          const ctx = ctxRef.current;
          if (!ctx) return;
          const { gl, uTime } = ctx;

          let rafId;
          const start = performance.now();
          const draw = () => {
            const t = (performance.now() - start) / 1000;
            gl.uniform1f(uTime, t);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            rafId = requestAnimationFrame(draw);
          };
          draw();

          return () => cancelAnimationFrame(rafId);
        }, [isActive]);

        return h("canvas", {
          ref: canvasRef,
          className: "card-shader" + (isActive ? " is-active" : ""),
        });
      }

      // sRGB luminance of Chainlink's accent — the target greyscale
      // level that every collapsed shader is normalised to so all
      // greyscale frames read at the same brightness.
      const TARGET_GREY_LUMINANCE = 95;

      function Card({
        title, subtitle, url, ticker, icon, accent, collateral, stats, shaderVariant,
        i, isSelected, selectedIdx, onClick,
      }) {
        // Top of array (i=0) gets lowest z; bottom (i=N-1) is highest and sits on top.
        // When a card is selected it must paint above the others as they exit.
        const z = isSelected ? N + 1 : i + 1;
        const ty = (i - (N - 1) / 2) * ROW_PITCH;

        // Per-card brightness factor applied to the greyscale state.
        // A warm accent (Maple/Spark) desaturates to a brighter grey
        // than a cool one (Chainlink), so we scale by the ratio of
        // luminances to pin every collapsed frame to the same level.
        const accMatch = accent.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
        const accentLum = accMatch
          ? 0.299 * +accMatch[1] + 0.587 * +accMatch[2] + 0.114 * +accMatch[3]
          : 128;
        const greyBrightness = (TARGET_GREY_LUMINANCE / accentLum).toFixed(3);
        // Cards below the selected one shift up by a slot to fill the gap
        // it left behind. Cards above the selection stay put.
        const shiftUp = selectedIdx !== null && !isSelected && i > selectedIdx;
        const tyLeft = shiftUp ? ty - ROW_PITCH : ty;

        // The extra-content block is absolutely positioned, so the card
        // can't auto-size to it. Measure where it actually ends and set
        // the expanded height to leave a 12px bottom margin matching the
        // top padding. Re-measure after web fonts load, since text wrap
        // (and therefore the block's height) can shift once Inter swaps in.
        const extraRef = useRef(null);
        const [expandedH, setExpandedH] = useState(null);
        const [isHovered, setIsHovered] = useState(false);
        // CTA state machine: idle → loading → sending → sent.
        // - loading (1.2s): bouncy dots simulate the async request
        // - sending (2s): plane soars across (~1s), then "Request sent"
        //   rolls up letter by letter in a rolodex slot
        // - sent: button disables and surface slowly fades to muted
        const [ctaState, setCtaState] = useState("idle");
        const ctaTimeoutRef = useRef(null);
        useEffect(() => {
          return () => {
            if (ctaTimeoutRef.current) clearTimeout(ctaTimeoutRef.current);
          };
        }, []);
        useEffect(() => {
          const el = extraRef.current;
          if (!el) return;
          const measure = () => setExpandedH(el.offsetTop + el.offsetHeight + 12);
          measure();
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(measure);
          }
        }, []);

        const statsEl = h(
          "div",
          { className: "card-stats" },
          stats.map((s, si) =>
            h(
              "div",
              { key: si, className: "card-stat" },
              h("span", { className: "label" }, s.label),
              h(
                "span",
                { className: "value" },
                s.value,
                s.unit ? h("span", { className: "unit" }, s.unit) : null
              )
            )
          )
        );

        // Accepted-collateral line: a body-copy paragraph with a muted
        // prefix label, sized as a single line of structured data.
        const collateralEl = h(
          "p",
          { className: "card-collateral" },
          h("span", { className: "prefix" }, "Accepted collateral: "),
          collateral
        );

        return h(
          "article",
          {
            className: "card" + (isSelected ? " is-selected" : ""),
            onClick,
            onMouseEnter: () => setIsHovered(true),
            onMouseLeave: () => setIsHovered(false),
            style: {
              "--z": z,
              "--ty": ty + "px",
              "--ty-left": tyLeft + "px",
              "--top-ty": TOP_TY + "px",
              "--accent": accent,
              "--grey-brightness": greyBrightness,
              "--expanded-h": expandedH ? expandedH + "px" : undefined,
            },
          },
          h(
            "div",
            { className: "card-hero" },
            h(ShaderCanvas, { variant: shaderVariant, accent, isSelected, isHovered }),
            icon
              ? h("img", { className: "card-hero-icon", src: icon, alt: "" })
              : h("span", { className: "card-hero-ticker" }, ticker)
          ),
          h(
            "div",
            { className: "card-text" },
            h(
              "div",
              { className: "card-text-inner" },
              h("h3", { className: "card-title" }, title),
              h("p", { className: "card-subtitle" }, subtitle)
            ),
            h(
              "a",
              {
                className: "card-linkout",
                href: url,
                target: "_blank",
                rel: "noopener noreferrer",
                "aria-label": "Visit " + title,
                // Stop the card's onClick so opening the link doesn't
                // also toggle the expand/collapse state of the card.
                onClick: (e) => e.stopPropagation(),
              },
              h("span", { className: "material-symbols-outlined" }, "arrow_outward")
            )
          ),
          h(
            "div",
            { className: "card-extra", ref: extraRef },
            collateralEl,
            statsEl,
            h(
              "button",
              {
                type: "button",
                className: "card-cta" + (ctaState === "sent" ? " is-sent" : ""),
                disabled: ctaState !== "idle",
                // Stop the card's onClick so pressing the CTA doesn't
                // also collapse the card. Walks the button through
                // loading → sending → sent on staggered timeouts.
                onClick: (e) => {
                  e.stopPropagation();
                  if (ctaState !== "idle") return;
                  setCtaState("loading");
                  ctaTimeoutRef.current = setTimeout(() => {
                    setCtaState("sending");
                    ctaTimeoutRef.current = setTimeout(() => {
                      setCtaState("sent");
                      ctaTimeoutRef.current = null;
                    }, 2000);
                  }, 1200);
                },
              },
              ctaState === "loading" && h(
                "span",
                { className: "card-cta-spinner" },
                h("span"),
                h("span"),
                h("span")
              ),
              ctaState === "sending" && h(
                "span",
                { className: "card-cta-plane material-symbols-outlined" },
                "send"
              ),
              ctaState === "idle" ? "Add counterparty" :
                ctaState === "loading" ? "Adding..." :
                  h(
                    "span",
                    { className: "card-cta-rolodex" },
                    "Request sent".split("").map((char, i) =>
                      h(
                        "span",
                        {
                          key: i,
                          // Letters start rolling in after the plane has
                          // flown across (1s), then each follows 0.035s
                          // behind the previous for a staggered wave.
                          style: { animationDelay: (1 + i * 0.035) + "s" },
                        },
                        char === " " ? " " : char
                      )
                    )
                  )
            )
          )
        );
      }

      // Default: vertical lineup. Click a card → others exit left, picked
      // card rides up to the top slot and morphs into a tall vertical layout.
      function App() {
        const [selected, setSelected] = useState(null);

        const reset = () => setSelected(null);

        return h(
          "div",
          {
            className: "stage",
            onClick: reset,
          },
          h(
            "div",
            { className: "stack" + (selected !== null ? " selected" : "") },
            CARDS.map((c, i) =>
              h(Card, {
                key: i,
                i,
                ...c,
                isSelected: selected === i,
                selectedIdx: selected,
                onClick: (e) => {
                  e.stopPropagation();
                  if (selected === i) reset();
                  else setSelected(i);
                },
              })
            )
          )
        );
      }

      createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
